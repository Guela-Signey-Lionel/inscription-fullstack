server:
  port: 8082

spring:
  application:
    name: inscription-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inscription_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@pkfokam.edu}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  quartz:
    job-store-type: memory
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-secret}
            authorization-grant-type: authorization_code
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:your-ms-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:your-secret}
            authorization-grant-type: authorization_code
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            provider: microsoft
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys

app:
  jwt:
    secret: ${JWT_SECRET:aW5zY3JpcHRpb25TZWNyZXRLZXlGb3JKV1RTaWduaW5nUEtGb2thbTEyMzQ1Njc=}
    access-expiration: 900000
    refresh-expiration: 604800000
  upload:
    path: ${UPLOAD_PATH:./uploads}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5174,http://localhost:5173,http://localhost:3000}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_xxxx}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_xxxx}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_xxxx}
  otp:
    expiration-minutes: 10
  scheduler:
    relance-j3-cron: "0 0 8 * * ?"
    relance-j6-cron: "0 0 8 * * ?"
    expiration-cron: "0 0 3 * * ?"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pkfokam.inscription: DEBUG
    org.springframework.statemachine: INFO
