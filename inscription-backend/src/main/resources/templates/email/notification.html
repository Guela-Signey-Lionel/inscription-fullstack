<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${titre}">PKFokam</title></head>
<body style="font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;margin:0;padding:20px;">
<div style="max-width:600px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
  <div style="background:linear-gradient(135deg,#1a56db,#3b82f6);padding:30px;text-align:center;">
    <h1 style="color:white;margin:0;font-size:22px;font-weight:700;">PKFokam Institute of Excellence</h1>
    <p style="color:rgba(255,255,255,0.8);margin:5px 0 0;font-size:13px;">Plateforme d'Inscription en Ligne</p>
  </div>
  <div style="padding:30px;">
    <h2 th:text="${titre}" style="color:#1e3a8a;font-size:18px;margin-top:0;"></h2>
    <div th:utext="${message}" style="color:#475569;line-height:1.6;font-size:14px;"></div>
    <a th:if="${lien}" th:href="${lien}" style="display:inline-block;margin-top:20px;background:#1a56db;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">
      Voir les détails
    </a>
  </div>
  <div style="background:#f8fafc;padding:20px 30px;border-top:1px solid #e2e8f0;">
    <p style="color:#94a3b8;font-size:11px;margin:0;">PKFokam Institute of Excellence · Système d'Inscription PROJ-04</p>
  </div>
</div>
</body>
</html>
