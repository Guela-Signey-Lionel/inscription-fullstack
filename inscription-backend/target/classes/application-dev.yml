# Profil "dev" — démarrage rapide, OAuth2 désactivé
# Utilisation : --spring.profiles.active=dev
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
  jpa:
    show-sql: true

logging:
  level:
    com.pkfokam.inscription: DEBUG
